<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#08080e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GeoSpark">
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="GeoSpark">
<meta name="description" content="Geography trivia that learns you">
<link rel="manifest" href="manifest.json">
<title>GeoSpark</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script>
// ═══════════════════════════════════════
// PWA: Inline manifest + service worker
// ═══════════════════════════════════════
(function initPWA(){
  // Generate a 512x512 SVG icon as data URI
  const iconSVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <defs>
      <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#0e0e1a"/>
        <stop offset="100%" stop-color="#08080e"/>
      </linearGradient>
      <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#7c6af6"/>
        <stop offset="100%" stop-color="#a78bfa"/>
      </linearGradient>
      <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#2dd4a0"/>
        <stop offset="100%" stop-color="#7c6af6"/>
      </linearGradient>
    </defs>
    <rect width="512" height="512" rx="108" fill="url(#bg)"/>
    <circle cx="256" cy="230" r="120" fill="none" stroke="url(#glow)" stroke-width="8" opacity="0.3"/>
    <circle cx="256" cy="230" r="90" fill="none" stroke="url(#accent)" stroke-width="6" opacity="0.5"/>
    <circle cx="256" cy="230" r="60" fill="url(#accent)" opacity="0.15"/>
    <text x="256" y="250" text-anchor="middle" font-size="100" font-family="sans-serif">🌍</text>
    <text x="256" y="420" text-anchor="middle" font-size="52" font-weight="700" font-family="sans-serif" fill="#eae8f4" letter-spacing="-2">GeoSpark</text>
    <text x="256" y="455" text-anchor="middle" font-size="22" font-family="sans-serif" fill="#6e6c82">geography trivia</text>
  </svg>`;

  const iconDataURI = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(iconSVG);

  // Generate a 512px PNG icon from the SVG via canvas
  const iconPromise = new Promise(resolve => {
    const canvas = document.createElement('canvas');
    canvas.width = 512; canvas.height = 512;
    const ctx2d = canvas.getContext('2d');
    const img = new Image();
    img.onload = () => {
      ctx2d.drawImage(img, 0, 0, 512, 512);
      try { resolve(canvas.toDataURL('image/png')); }
      catch(e) { resolve(iconDataURI); }
    };
    img.onerror = () => resolve(iconDataURI);
    img.src = iconDataURI;
  });

  iconPromise.then(pngURI => {
    // Apple touch icon
    const appleLink = document.createElement('link');
    appleLink.rel = 'apple-touch-icon';
    appleLink.href = pngURI;
    document.head.appendChild(appleLink);

    // Favicon
    const favLink = document.createElement('link');
    favLink.rel = 'icon';
    favLink.type = 'image/png';
    favLink.href = pngURI;
    document.head.appendChild(favLink);

    // Web app manifest — only create blob fallback if static manifest.json is missing
    const existingManifest = document.querySelector('link[rel="manifest"]');
    if(!existingManifest || !existingManifest.href.includes('manifest.json')){
      const manifest = {
        name: "GeoSpark",
        short_name: "GeoSpark",
        description: "Geography trivia that learns you",
        start_url: location.href.split('?')[0],
        display: "standalone",
        orientation: "portrait",
        background_color: "#08080e",
        theme_color: "#08080e",
        categories: ["games", "education"],
        icons: [
          { src: pngURI, sizes: "512x512", type: "image/png", purpose: "any" },
          { src: pngURI, sizes: "512x512", type: "image/png", purpose: "maskable" },
          { src: iconDataURI, sizes: "any", type: "image/svg+xml" }
        ]
      };
      const manifestBlob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
      const manifestURL = URL.createObjectURL(manifestBlob);
      const manifestLink = document.createElement('link');
      manifestLink.rel = 'manifest';
      manifestLink.href = manifestURL;
      document.head.appendChild(manifestLink);
    }
  });

  // Service worker (inline via blob)
  const swCode = `
    const CACHE_NAME = 'geospark-v1';
    const SELF_URL = self.location.href;

    self.addEventListener('install', e => {
      e.waitUntil(
        caches.open(CACHE_NAME).then(cache => {
          // Cache the page that registered us
          return cache.addAll([self.registration.scope]);
        }).catch(() => {})
      );
      self.skipWaiting();
    });

    self.addEventListener('activate', e => {
      e.waitUntil(
        caches.keys().then(keys =>
          Promise.all(keys.filter(k => k !== CACHE_NAME).map(k => caches.delete(k)))
        )
      );
      self.clients.claim();
    });

    self.addEventListener('fetch', e => {
      // Only handle same-origin navigations and the Google Fonts
      const url = new URL(e.request.url);
      if (e.request.method !== 'GET') return;

      e.respondWith(
        caches.match(e.request).then(cached => {
          const fetchPromise = fetch(e.request).then(response => {
            if (response && response.status === 200) {
              const clone = response.clone();
              caches.open(CACHE_NAME).then(cache => {
                try { cache.put(e.request, clone); } catch(err) {}
              });
            }
            return response;
          }).catch(() => cached);

          return cached || fetchPromise;
        })
      );
    });
  `;

  if ('serviceWorker' in navigator) {
    const swBlob = new Blob([swCode], {type: 'application/javascript'});
    const swURL = URL.createObjectURL(swBlob);
    navigator.serviceWorker.register(swURL, {scope: location.pathname})
      .then(reg => {
        // Revoke after a brief delay to allow registration
        setTimeout(() => URL.revokeObjectURL(swURL), 5000);
      })
      .catch(() => {
        // SW registration may fail on some hosts — app still works fine
        URL.revokeObjectURL(swURL);
      });
  }
})();
</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#08080e;--surface:#101018;--surface2:#181824;--surface3:#222236;
--border:#2a2a42;--text:#eae8f4;--text-dim:#6e6c82;
--accent:#7c6af6;--accent2:#a78bfa;--accent-glow:#7c6af630;
--correct:#2dd4a0;--correct-glow:#2dd4a025;
--wrong:#f87171;--wrong-glow:#f8717125;
--gold:#fbbf24;--gold-glow:#fbbf2425;
}
html,body{height:100%;width:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
.app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto;position:relative;overflow:hidden;}
.bg-fx{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse at 30% -10%,#7c6af60a 0%,transparent 55%),radial-gradient(ellipse at 70% 110%,#2dd4a006 0%,transparent 50%);}

/* HEADER */
.header{position:relative;z-index:2;padding:10px 16px 6px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.logo{font-family:'DM Mono',monospace;font-weight:500;font-size:17px;letter-spacing:-0.5px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hdr-stats{display:flex;gap:12px;align-items:center;}
.st{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text-dim);font-weight:500;}
.st .v{color:var(--text);font-family:'DM Mono',monospace;font-size:13px;}

/* LEVEL BAR */
.lvl-wrap{padding:0 16px 8px;flex-shrink:0;z-index:2;position:relative;}
.lvl-info{display:flex;justify-content:space-between;margin-bottom:4px;}
.lvl-l{font-size:11px;color:var(--text-dim);font-weight:600;text-transform:uppercase;letter-spacing:1px;}
.lvl-n{font-family:'DM Mono',monospace;font-size:11px;color:var(--accent);}
.lvl-track{height:3px;border-radius:3px;background:var(--surface3);overflow:hidden;}
.lvl-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .5s cubic-bezier(.4,0,.2,1);}

/* STAGE PILLS */
.stage-row{padding:0 16px 8px;flex-shrink:0;z-index:2;position:relative;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;}
.stage-row::-webkit-scrollbar{display:none;}
.stage-pill{font-size:10px;font-weight:600;padding:4px 10px;border-radius:20px;background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);white-space:nowrap;flex-shrink:0;text-transform:uppercase;letter-spacing:.8px;transition:all .2s;}
.stage-pill.active{background:var(--accent-glow);border-color:var(--accent);color:var(--accent);}
.stage-pill.locked{opacity:.35;}

/* GAME AREA */
.game-area{flex:1;display:flex;flex-direction:column;padding:0 16px;z-index:2;position:relative;min-height:0;}

/* TIMER */
.timer-wrap{display:flex;justify-content:center;margin-bottom:6px;flex-shrink:0;}
.timer-ring{width:44px;height:44px;position:relative;}
.timer-ring svg{width:100%;height:100%;transform:rotate(-90deg);}
.timer-ring .trk{fill:none;stroke:var(--surface3);stroke-width:3;}
.timer-ring .fl{fill:none;stroke:var(--accent);stroke-width:3;stroke-linecap:round;stroke-dasharray:138.23;stroke-dashoffset:0;}
.timer-ring .tt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:13px;font-weight:500;}
.timer-danger .fl{stroke:var(--wrong);}
.timer-danger .tt{color:var(--wrong);}

/* QUESTION CARD */
.q-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;text-align:center;flex-shrink:0;margin-bottom:8px;}
.q-badge{display:inline-block;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent);background:var(--accent-glow);padding:3px 10px;border-radius:20px;margin-bottom:8px;}
.q-flag{font-size:64px;line-height:1;margin:2px 0 6px;}
.q-text{font-size:20px;font-weight:700;letter-spacing:-.3px;margin:6px 0;}
.q-sub{font-size:13px;color:var(--text-dim);margin-top:2px;}

/* OPTIONS */
.options{display:flex;flex-direction:column;gap:7px;flex:1;min-height:0;justify-content:center;}
.opt-btn{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:11px;padding:13px 14px;color:var(--text);font-family:'Outfit',sans-serif;font-size:15px;font-weight:500;cursor:pointer;transition:transform .08s;display:flex;align-items:center;gap:9px;text-align:left;-webkit-user-select:none;user-select:none;flex-shrink:0;touch-action:manipulation;}
.opt-btn:active{transform:scale(.97);}
.opt-btn .ok{width:24px;height:24px;border-radius:7px;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:11px;font-weight:500;color:var(--text-dim);flex-shrink:0;}
.opt-btn.correct{background:var(--correct-glow);border-color:var(--correct);color:var(--correct);}
.opt-btn.correct .ok{background:var(--correct);color:#08080e;}
.opt-btn.wrong{background:var(--wrong-glow);border-color:var(--wrong);color:var(--wrong);animation:shake .4s ease;}
.opt-btn.wrong .ok{background:var(--wrong);color:#08080e;}
.opt-btn.disabled{pointer-events:none;opacity:.45;}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}

/* MAP CONTAINER */
.map-container{flex:1;display:flex;align-items:center;justify-content:center;min-height:0;position:relative;}
.map-container svg{width:100%;height:100%;max-height:340px;}
.map-container svg path{fill:var(--surface3);stroke:var(--border);stroke-width:.5;cursor:pointer;transition:fill .15s;}
.map-container svg path:active{fill:var(--surface2);}
.map-container svg path.map-correct{fill:var(--correct);stroke:var(--correct);opacity:.9;}
.map-container svg path.map-wrong{fill:var(--wrong);stroke:var(--wrong);opacity:.9;animation:shake .4s ease;}
.map-container svg path.map-highlight{fill:var(--accent);stroke:var(--accent);opacity:.85;}
.map-container svg path.map-dim{opacity:.3;pointer-events:none;}

/* FEEDBACK */
.feedback{flex-shrink:0;padding:6px 0;text-align:center;min-height:30px;display:flex;align-items:center;justify-content:center;gap:5px;font-size:13px;font-weight:600;}
.feedback.c-fb{color:var(--correct);}.feedback.w-fb{color:var(--wrong);}.feedback.t-fb{color:var(--gold);}

/* BOTTOM MODES */
.bot-bar{flex-shrink:0;padding:6px 16px 12px;display:flex;gap:6px;z-index:2;position:relative;}
.bot-btn{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:9px 6px;color:var(--text-dim);font-family:'Outfit',sans-serif;font-size:11px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s;text-transform:uppercase;letter-spacing:.6px;touch-action:manipulation;}
.bot-btn.active{background:var(--accent-glow);border-color:var(--accent);color:var(--accent);}

/* SCREENS */
.screen{position:absolute;inset:0;z-index:10;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;transition:opacity .35s,visibility .35s;}
.screen.hidden{opacity:0;visibility:hidden;pointer-events:none;}
.sp-logo{font-family:'DM Mono',monospace;font-weight:500;font-size:36px;letter-spacing:-2px;background:linear-gradient(135deg,var(--accent),var(--accent2),var(--correct));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px;}
.sp-sub{color:var(--text-dim);font-size:13px;margin-bottom:32px;}
.sp-flags{font-size:28px;margin-bottom:28px;letter-spacing:3px;}
.big-btn{width:100%;max-width:260px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:12px;padding:14px;color:#fff;font-family:'Outfit',sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:transform .08s;box-shadow:0 4px 20px var(--accent-glow);touch-action:manipulation;}
.big-btn:active{transform:scale(.96);}
.sp-sts{margin-top:24px;display:flex;gap:20px;}
.sp-s{text-align:center;}
.sp-s .sv{font-family:'DM Mono',monospace;font-size:20px;font-weight:500;color:var(--text);}
.sp-s .sl{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
.go-title{font-size:26px;font-weight:800;margin-bottom:4px;}
.go-sub{color:var(--text-dim);font-size:13px;margin-bottom:20px;}
.go-score{font-family:'DM Mono',monospace;font-size:48px;font-weight:500;background:linear-gradient(135deg,var(--gold),#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px;}
.go-label{color:var(--text-dim);font-size:11px;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:20px;}
.go-sts{display:flex;gap:16px;margin-bottom:28px;}
.go-s{text-align:center;}
.go-s .gv{font-family:'DM Mono',monospace;font-size:18px;font-weight:500;}
.go-s .gl{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
.go-new{color:var(--gold);font-size:12px;font-weight:600;margin-bottom:14px;}

/* LEARN PAGE */
.learn-screen{position:absolute;inset:0;z-index:12;background:var(--bg);display:flex;flex-direction:column;transition:opacity .35s,visibility .35s;overflow:hidden;}
.learn-screen.hidden{opacity:0;visibility:hidden;pointer-events:none;}
.learn-hdr{flex-shrink:0;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.learn-title{font-family:'DM Mono',monospace;font-weight:500;font-size:17px;color:var(--text);}
.learn-back{background:none;border:1px solid var(--border);border-radius:8px;padding:6px 14px;color:var(--text-dim);font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;cursor:pointer;touch-action:manipulation;}
.learn-body{flex:1;overflow-y:auto;padding:12px 16px 24px;-webkit-overflow-scrolling:touch;}
.learn-continent{margin-bottom:20px;}
.learn-cont-title{font-size:14px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border);}
.learn-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--surface3);}
.learn-flag{flex-shrink:0;width:40px;display:flex;align-items:center;justify-content:center;}
.learn-info{flex:1;min-width:0;}
.learn-name{font-size:14px;font-weight:600;color:var(--text);}
.learn-cap{font-size:12px;color:var(--text-dim);margin-top:1px;}
.learn-admin-link{margin-top:24px;text-align:center;}
.learn-admin-link button{background:none;border:1px solid var(--border);border-radius:8px;padding:8px 20px;color:var(--text-dim);font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;cursor:pointer;touch-action:manipulation;letter-spacing:.5px;}

/* ADMIN PANEL */
.admin-panel{margin-top:16px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;display:none;}
.admin-panel.show{display:block;}
.admin-title{font-size:13px;font-weight:700;color:var(--wrong);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;}
.admin-code-row{display:flex;gap:8px;margin-bottom:12px;align-items:center;}
.admin-code-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-family:'DM Mono',monospace;font-size:14px;text-align:center;letter-spacing:4px;outline:none;}
.admin-code-input:focus{border-color:var(--accent);}
.admin-code-btn{background:var(--accent-glow);border:1px solid var(--accent);border-radius:8px;padding:10px 16px;color:var(--accent);font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;cursor:pointer;touch-action:manipulation;}
.admin-levels{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;}
.admin-lvl-btn{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text-dim);font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;touch-action:manipulation;transition:all .15s;}
.admin-lvl-btn:active{transform:scale(.95);}
.admin-lvl-btn.unlocked{border-color:var(--correct);color:var(--correct);background:var(--correct-glow);}
.admin-msg{font-size:11px;color:var(--text-dim);margin-top:8px;text-align:center;}

/* SPLASH LEARN BTN */
.sp-learn-btn{margin-top:12px;background:none;border:1px solid var(--border);border-radius:12px;padding:12px;width:100%;max-width:260px;color:var(--text-dim);font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;cursor:pointer;touch-action:manipulation;transition:all .15s;}
.sp-learn-btn:active{transform:scale(.97);}

/* ═══════════════════════════════════════ */
/* LANDSCAPE & WIDE SCREEN ADAPTATION     */
/* ═══════════════════════════════════════ */

/* Short viewport (landscape phone or small laptop window) */
@media (max-height:500px){
  .app{max-width:100%;}
  .header{padding:4px 16px 2px;}
  .lvl-wrap{padding:0 16px 4px;}
  .stage-row{padding:0 16px 4px;}
  .timer-wrap{margin-bottom:2px;}
  .timer-ring{width:32px;height:32px;}
  .timer-ring .tt{font-size:11px;}
  .q-card{padding:6px 12px;margin-bottom:4px;border-radius:10px;}
  .q-badge{margin-bottom:4px;padding:2px 8px;font-size:8px;}
  .q-flag{font-size:36px;margin:0;}
  .q-flag img{max-width:36px!important;}
  .q-text{font-size:16px;margin:2px 0;}
  .q-sub{font-size:11px;margin-top:0;}
  .options{gap:4px;}
  .opt-btn{padding:8px 10px;font-size:13px;border-radius:8px;}
  .opt-btn .ok{width:20px;height:20px;border-radius:5px;font-size:10px;}
  .feedback{padding:2px 0;min-height:20px;font-size:11px;}
  .bot-bar{padding:3px 16px 6px;}
  .bot-btn{padding:5px 6px;font-size:10px;border-radius:8px;}
  .map-container svg{max-height:180px;}
}

/* Wide landscape (phone landscape or tablet) */
@media (max-height:500px) and (min-width:600px){
  .app{max-width:100%;}
  .game-area{flex-direction:row;gap:12px;align-items:stretch;}
  .game-area>.timer-wrap{display:none;}
  .q-card{flex:0 0 auto;width:35%;display:flex;flex-direction:column;align-items:center;justify-content:center;margin-bottom:0;position:relative;}
  .q-card::after{content:attr(data-timer);position:absolute;top:6px;right:10px;font-family:'DM Mono',monospace;font-size:12px;color:var(--accent);font-weight:500;}
  .options{flex:1;justify-content:center;}
  .map-container{flex:1;}
  .feedback{position:absolute;bottom:0;left:0;right:0;z-index:5;}
}

/* Desktop / laptop (tall enough for column but wide) */
@media (min-width:600px) and (min-height:501px){
  .app{max-width:560px;}
  .options{max-width:480px;margin:0 auto;width:100%;}
  .q-card{max-width:480px;margin:0 auto 8px;}
}

/* Very wide desktop */
@media (min-width:900px) and (min-height:501px){
  .app{max-width:640px;}
  .opt-btn{padding:14px 18px;font-size:16px;}
  .q-flag{font-size:72px;}
  .q-flag img{max-width:72px!important;}
}

.hidden{display:none!important;}
</style>
</head>
<body>
<div class="app">
<div class="bg-fx"></div>

<!-- SPLASH -->

// AUDIO ENGINE (Web Audio API synthesis)
// ═══════════════════════════════════════
const AudioEngine = (() => {
  let ctx;
  let ready = false;
  function init() {
    if (ready) return;
    try {
      ctx = new (window.AudioContext || window.webkitAudioContext)();
      ready = true;
    } catch(e) { ready = false; }
  }
  // Call on first touch to unlock audio
  function unlock() {
    init();
    if (ctx && ctx.state === 'suspended') ctx.resume();
  }
  function ok() { return ready && ctx && ctx.state === 'running'; }

  function tap() {
    if(!ok())return;const t=ctx.currentTime;
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.type='sine';o.frequency.setValueAtTime(600,t);
    o.frequency.exponentialRampToValueAtTime(900,t+0.06);
    g.gain.setValueAtTime(0.12,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.1);
    o.connect(g);g.connect(ctx.destination);o.start(t);o.stop(t+0.1);
  }

  function correct() {
    if(!ok())return;const t=ctx.currentTime;
    [523,659,784].forEach((f,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type='sine';o.frequency.setValueAtTime(f,t+i*0.08);
      g.gain.setValueAtTime(0.1,t+i*0.08);g.gain.exponentialRampToValueAtTime(0.001,t+i*0.08+0.2);
      o.connect(g);g.connect(ctx.destination);o.start(t+i*0.08);o.stop(t+i*0.08+0.2);
    });
  }

  function wrong() {
    if(!ok())return;const t=ctx.currentTime;
    [300,280].forEach((f,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type='square';o.frequency.setValueAtTime(f,t+i*0.12);
      g.gain.setValueAtTime(0.07,t+i*0.12);g.gain.exponentialRampToValueAtTime(0.001,t+i*0.12+0.15);
      o.connect(g);g.connect(ctx.destination);o.start(t+i*0.12);o.stop(t+i*0.12+0.15);
    });
  }

  function timeout() {
    if(!ok())return;const t=ctx.currentTime;
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.type='triangle';o.frequency.setValueAtTime(440,t);
    o.frequency.exponentialRampToValueAtTime(220,t+0.3);
    g.gain.setValueAtTime(0.1,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.35);
    o.connect(g);g.connect(ctx.destination);o.start(t);o.stop(t+0.35);
  }

  function levelUp() {
    if(!ok())return;const t=ctx.currentTime;
    [523,659,784,1047].forEach((f,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type='sine';o.frequency.setValueAtTime(f,t+i*0.1);
      g.gain.setValueAtTime(0.09,t+i*0.1);g.gain.exponentialRampToValueAtTime(0.001,t+i*0.1+0.25);
      o.connect(g);g.connect(ctx.destination);o.start(t+i*0.1);o.stop(t+i*0.1+0.25);
    });
  }

  function gameOver() {
    if(!ok())return;const t=ctx.currentTime;
    [440,370,311,261].forEach((f,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type='sine';o.frequency.setValueAtTime(f,t+i*0.15);
      g.gain.setValueAtTime(0.1,t+i*0.15);g.gain.exponentialRampToValueAtTime(0.001,t+i*0.15+0.3);
      o.connect(g);g.connect(ctx.destination);o.start(t+i*0.15);o.stop(t+i*0.15+0.3);
    });
  }

  function mapTap() {
    if(!ok())return;const t=ctx.currentTime;
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.type='sine';o.frequency.setValueAtTime(500,t);
    o.frequency.exponentialRampToValueAtTime(700,t+0.04);
    g.gain.setValueAtTime(0.08,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.08);
    o.connect(g);g.connect(ctx.destination);o.start(t);o.stop(t+0.08);
  }

  return { tap, correct, wrong, timeout, levelUp, gameOver, mapTap, unlock };
})();

// Convert country code to emoji flag (regional indicator symbols)
function ccToEmoji(cc){

// Returns HTML string for a flag — emoji on mobile, inline SVG on desktop
function flagHTML(cc, size=48){
  if(IS_MOBILE){
    const fs = size > 40 ? 64 : (size > 24 ? 32 : 20);
    return `<span style="font-size:${fs}px;line-height:1">${ccToEmoji(cc)}</span>`;
  }
  const svg = FLAG_SVG[cc];
  if(!svg) return `<span style="font-size:${size>40?48:24}px">${ccToEmoji(cc)}</span>`; // fallback
  const dataURI = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
  return `<img src="${dataURI}" alt="" style="width:${size}px;height:auto;border-radius:3px;vertical-align:middle;display:inline-block;">`;
}

// Returns inline flag for feedback/subs
function flagInline(cc){
  if(IS_MOBILE) return ccToEmoji(cc);
  const svg = FLAG_SVG[cc];
  if(!svg) return ccToEmoji(cc);
  const dataURI = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
  return `<img src="${dataURI}" alt="" style="width:22px;height:auto;border-radius:2px;vertical-align:middle;display:inline-block;margin:0 2px;">`;
}

function getMaxTier(){
  if(S.level<=4)return 1;if(S.level<=9)return 2;if(S.level<=14)return 3;
  if(S.level<=19)return 5;if(S.level<=24)return 6;return 6;
}
function getTimer(){ return Math.max(5, 15 - Math.floor((S.level-1)*0.4)); }
function getWeight(c){
  const st=profile.countryStats[c.name]||{cor:0,wrn:0};
  let w=1;
  if(st.wrn>st.cor) w+=2;
  if(st.wrn>0&&st.cor===0) w+=3;
  if(st.cor>=5&&st.wrn===0) w=0.2;
  return w;
}

function getUnlockedStages(){
  return STAGES.filter(s=>S.level>=s.unlock);
}
function pickStage(){
  const unlocked = getUnlockedStages();
  S.activeStages = unlocked.map(s=>s.id);
  // Weighted: newer stages get slightly higher chance
  const weights = unlocked.map((_,i)=> 1 + i*0.5);
  const total = weights.reduce((a,b)=>a+b,0);
  let r = Math.random()*total;
  for(let i=0;i<unlocked.length;i++){
    r-=weights[i];
    if(r<=0) return unlocked[i];
  }
  return unlocked[0];
}

function renderStagePills(){
  const row = document.getElementById('stage-row');
  row.innerHTML = STAGES.map(s=>{
    const unlocked = S.level>=s.unlock;
    const cls = S.activeStages.includes(s.id) ? 'active' : (unlocked?'':'locked');
    return `<div class="stage-pill ${cls}">${s.icon} ${s.label}${unlocked?'':' 🔒'+s.unlock}</div>`;
  }).join('');
}

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function pickCountry(){
  const maxTier=getMaxTier();
  const pool=COUNTRIES.filter(c=>c.tier<=maxTier);
  const blockN=Math.min(Math.floor(pool.length*0.6),S.recentAnswers.length);
  const blocked=new Set(S.recentAnswers.slice(-blockN));
  let eligible=pool.filter(c=>!blocked.has(c.name));
  if(eligible.length<4) eligible=pool;
  const weights=eligible.map(c=>getWeight(c));
  const totalW=weights.reduce((a,b)=>a+b,0);
  let r=Math.random()*totalW, chosen=eligible[0];
  for(let i=0;i<eligible.length;i++){r-=weights[i];if(r<=0){chosen=eligible[i];break;}}
  S.recentAnswers.push(chosen.name);
  if(S.recentAnswers.length>30) S.recentAnswers.splice(0,S.recentAnswers.length-30);
  return chosen;
}

function getDistractors(correct, pool, count=3){
  const recentSet=new Set(S.recentAnswers.slice(-3));
  recentSet.delete(correct.name||correct);
  let cands=pool.filter(c=>{
    const n=c.name||c;
    return n!==(correct.name||correct) && !recentSet.has(n);
  });
  if(cands.length<count) cands=pool.filter(c=>(c.name||c)!==(correct.name||correct));
  cands=shuffle(cands);
  // At higher levels prefer same continent
  if(S.level>=3 && correct.continent){
    cands.sort((a,b)=>{
      const sa=a.continent===correct.continent?0:1;
      const sb=b.continent===correct.continent?0:1;
      return sa-sb;
    });
  }
  return cands.slice(0,count);
}

function genFlagQ(){
  const c=pickCountry();
  const maxTier=getMaxTier();
  const pool=COUNTRIES.filter(x=>x.tier<=maxTier);
  const wrongs=getDistractors(c,pool);
  if(S.dir==='fwd'){
    // Show flag image, pick country name
    return {type:'mc',badge:'Flag → Country',prompt:{flagCC:c.cc},answer:c.name,
      options:shuffle([...wrongs.map(w=>w.name),c.name]),answerObj:c};
  } else {
    // Show country name, pick flag image
    return {type:'mc',badge:'Country → Flag',prompt:{text:c.name},answer:c.cc,
      options:shuffle([...wrongs.map(w=>w.cc),c.cc]),answerObj:c,optStyle:'flagimg'};
  }
}

}

function genContinentQ(){
  // Skip ambiguous countries (Russia spans Europe/Asia, Turkey similarly)
  const AMBIGUOUS = new Set(['Russia','Turkey']);
  let c;
  let attempts = 0;
  do { c = pickCountry(); attempts++; } while(AMBIGUOUS.has(c.name) && attempts < 10);
  if(AMBIGUOUS.has(c.name)) return genFlagQ(); // fallback

  if(S.dir==='fwd'){
    // Always guarantee the correct continent is in the options
    const wrongConts = shuffle(CONTINENTS.filter(x=>x!==c.continent)).slice(0,3);
    const opts = shuffle([...wrongConts, c.continent]);
    return {type:'mc',badge:'Country → Continent',prompt:{text:c.name,subCC:c.cc},answer:c.continent,
      options:opts,answerObj:c};
  } else {
    // Show continent, pick which country is in it
    const inCont=COUNTRIES.filter(x=>x.continent===c.continent && x.tier<=getMaxTier());
    const notInCont=COUNTRIES.filter(x=>x.continent!==c.continent && x.tier<=getMaxTier());
    const wrongs=shuffle(notInCont).slice(0,3);
    return {type:'mc',badge:'Continent → Country',prompt:{text:c.continent,sub:'🌍 Which country?'},answer:c.name,
      options:shuffle([...wrongs.map(w=>w.name),c.name]),answerObj:c};
  }
}

    if(S.dir==='fwd'){

    }
  } else {

        options:shuffle([...wrongs.map(w=>w.capital),chosen.capital]),answerObj:chosen};
    } else {
      return {type:'mc',badge:'🌍 Capital → African Country',prompt:{text:chosen.capital,sub:'Which African country?'},answer:chosen.name,
        options:shuffle([...wrongs.map(w=>w.name),chosen.name]),answerObj:chosen};
    }
  }
}

function genLesserKnownQ(){
  // Focus on tier 4-6 countries only
  const pool = COUNTRIES.filter(c => c.tier >= 4);
  const chosen = pool[Math.floor(Math.random()*pool.length)];
  const wrongs = shuffle(pool.filter(c=>c.name!==chosen.name)).slice(0,3);

  const mode = ['flag','capital','continent'][Math.floor(Math.random()*3)];
  if(mode==='flag'){
    if(S.dir==='fwd'){
      return {type:'mc',badge:'🔍 Rare Flag',prompt:{flagCC:chosen.cc},answer:chosen.name,
        options:shuffle([...wrongs.map(w=>w.name),chosen.name]),answerObj:chosen};
    } else {
      return {type:'mc',badge:'🔍 Rare Country',prompt:{text:chosen.name},answer:chosen.cc,
        options:shuffle([...wrongs.map(w=>w.cc),chosen.cc]),answerObj:chosen,optStyle:'flagimg'};
    }
  } else if(mode==='capital'){
    if(S.dir==='fwd'){
      return {type:'mc',badge:'🔍 Rare Capital',prompt:{text:chosen.name,subCC:chosen.cc},answer:chosen.capital,
        options:shuffle([...wrongs.map(w=>w.capital),chosen.capital]),answerObj:chosen};
    } else {
      return {type:'mc',badge:'🔍 Capital → Country',prompt:{text:chosen.capital,sub:'Which country?'},answer:chosen.name,
        options:shuffle([...wrongs.map(w=>w.name),chosen.name]),answerObj:chosen};
    }
  } else {
    return {type:'mc',badge:'🔍 Rare → Continent',prompt:{text:chosen.name,subCC:chosen.cc},answer:chosen.continent,
      options:shuffle([...shuffle(CONTINENTS.filter(x=>x!==chosen.continent)).slice(0,3),chosen.continent]),
      answerObj:chosen};
  }
}

function genMapQ(){
  // Continent maps only (no US states — that's a separate stage)
  const contChoices = ['Africa','Europe','South America','Asia'];
  const mapType = contChoices[Math.floor(Math.random()*contChoices.length)];
  const pool = COUNTRIES.filter(c=>c.continent===mapType && c.tier<=getMaxTier());
  if(pool.length<2) return genFlagQ();
  const c = pool[Math.floor(Math.random()*pool.length)];
  return {type:'map',badge:`Tap on the Map`,prompt:{text:c.name,subCC:c.cc,sub:mapType},
    answer:c.name,mapRegion:mapType.toLowerCase().replace(/ /g,'_'),answerObj:c};
}

function genUSMapQ(){
  // US States and Canadian Provinces
  const doCanada = Math.random() < 0.3;
  if(doCanada){
    const pr = CA_PROVINCES[Math.floor(Math.random()*CA_PROVINCES.length)];
    return {type:'map',badge:'Tap the Province',prompt:{text:pr.name,subCC:'ca',sub:'Canada'},
      answer:pr.abbr,mapRegion:'canada',answerObj:{name:pr.name}};
  }
  const st = US_STATES[Math.floor(Math.random()*US_STATES.length)];
  return {type:'map',badge:'Tap the State',prompt:{text:st.name,subCC:'us',sub:'United States'},
    answer:st.abbr,mapRegion:'us',answerObj:{name:st.name}};
}

function renderMC(q){
  const qCard=document.getElementById('q-card');
  const flagEl=document.getElementById('q-flag');
  const textEl=document.getElementById('q-text');
  const subEl=document.getElementById('q-sub');
  const badge=document.getElementById('q-badge');
  const opts=document.getElementById('options');
  const mapC=document.getElementById('map-container');
  const fb=document.getElementById('feedback');

  qCard.style.display='';
  opts.style.display='';
  mapC.style.display='none';
  fb.textContent='';fb.className='feedback';

  badge.textContent=q.badge;

  if(q.prompt.flagCC){
    // Show a flag (image or emoji depending on device)
    flagEl.style.display='';
    flagEl.innerHTML=flagHTML(q.prompt.flagCC, 64);
    textEl.style.display='none';subEl.style.display='none';
  } else {
    flagEl.style.display='none';
    textEl.style.display='';textEl.textContent=q.prompt.text;
    if(q.prompt.subCC){
      subEl.style.display='';subEl.innerHTML=flagInline(q.prompt.subCC);
    } else if(q.prompt.sub){
      subEl.style.display='';subEl.textContent=q.prompt.sub;
    } else {
      subEl.style.display='none';
    }
  }

  const keys=['A','B','C','D'];
  const isFlagOpt = q.optStyle==='flagimg';
  opts.innerHTML=q.options.map((o,i)=>{
    if(isFlagOpt){
      return `<button class="opt-btn" data-val="${String(o).replace(/"/g,'&quot;')}">
        <span class="ok">${keys[i]}</span><span>${flagHTML(o, 32)}</span></button>`;
    }
    return `<button class="opt-btn" data-val="${String(o).replace(/"/g,'&quot;')}">
      <span class="ok">${keys[i]}</span><span>${o}</span></button>`;
  }).join('');

  opts.querySelectorAll('.opt-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{AudioEngine.tap();handleAnswer(btn,btn.dataset.val);});
  });
}

function renderMap(q){
  const qCard=document.getElementById('q-card');
  const flagEl=document.getElementById('q-flag');
  const textEl=document.getElementById('q-text');
  const subEl=document.getElementById('q-sub');
  const badge=document.getElementById('q-badge');
  const opts=document.getElementById('options');
  const mapC=document.getElementById('map-container');
  const fb=document.getElementById('feedback');

  qCard.style.display='';
  opts.style.display='none';
  mapC.style.display='';
  fb.textContent='';fb.className='feedback';

  badge.textContent=q.badge;
  flagEl.style.display='none';
  textEl.style.display='';textEl.textContent=q.prompt.text;
  if(q.prompt.subCC){
    subEl.style.display='';subEl.innerHTML=flagInline(q.prompt.subCC)+(q.prompt.sub?' '+q.prompt.sub:'');
  } else if(q.prompt.sub){
    subEl.style.display='';subEl.textContent=q.prompt.sub;
  } else subEl.style.display='none';

  const mapInfo=MAP_DATA[q.mapRegion];
  if(!mapInfo){
    // Fallback to MC
    const fallback=genFlagQ();
    S.currentQ=fallback;
    renderMC(fallback);
    return;
  }

  let svg=`<svg viewBox="${mapInfo.viewBox}" xmlns="http://www.w3.org/2000/svg">`;
  for(const [name,data] of Object.entries(mapInfo.countries)){
    svg+=`<path d="${data.d}" data-name="${name}" />`;
  }
  svg+=`</svg>`;
  mapC.innerHTML=svg;

  mapC.querySelectorAll('path').forEach(path=>{
    path.addEventListener('click',()=>{
      AudioEngine.mapTap();
      handleMapAnswer(path,path.dataset.name);
    });
  });
}

// ═══════════════════════════════════════
// ANSWER HANDLING
// ═══════════════════════════════════════
function handleAnswer(btn,val){
  if(S.answered)return;
  S.answered=true;
  stopTimer();

  const q=S.currentQ;
  const isCorrect=val===q.answer;
  const fb=document.getElementById('feedback');
  const allBtns=document.querySelectorAll('.opt-btn');

  recordStats(q.answerObj?.name||q.answer, isCorrect);

  if(isCorrect){
    AudioEngine.correct();
    btn.classList.add('correct');
    allBtns.forEach(b=>{if(b!==btn)b.classList.add('disabled');});
    const timeB=Math.floor(S.timerLeft*10), streakB=S.streak*5;
    const pts=50+timeB+streakB;
    S.score+=pts;S.streak++;
    if(S.streak>S.bestStreak)S.bestStreak=S.streak;
    S.totalCorrect++;S.lvlProg++;
    fb.className='feedback c-fb';
    fb.innerHTML=`✓ +${pts}${streakB>0?' <span style="color:var(--gold)">🔥×'+S.streak+'</span>':''}`;
    checkLevelUp();
  } else {
    AudioEngine.wrong();
    btn.classList.add('wrong');
    allBtns.forEach(b=>{
      if(b.dataset.val===q.answer)b.classList.add('correct');
      else if(b!==btn)b.classList.add('disabled');
    });
    S.streak=0;S.lives--;
    fb.className='feedback w-fb';
    const wrongLabel = q.answerObj?.name || q.answer;
    fb.textContent=`✗ ${wrongLabel}`;
  }
  S.totalAnswered++;
  updateHUD();
  if(S.lives<=0) setTimeout(endGame,1200);
  else setTimeout(nextQ,1200);
}

function handleMapAnswer(path,name){
  if(S.answered)return;
  S.answered=true;
  stopTimer();

  const q=S.currentQ;
  const isCorrect=name===q.answer;
  const fb=document.getElementById('feedback');
  const allPaths=document.querySelectorAll('#map-container path');

  recordStats(q.answerObj?.name||q.answer, isCorrect);

  if(isCorrect){
    AudioEngine.correct();
    path.classList.add('map-correct');
    allPaths.forEach(p=>{if(p!==path)p.classList.add('map-dim');});
    const timeB=Math.floor(S.timerLeft*10), streakB=S.streak*5;
    const pts=50+timeB+streakB;
    S.score+=pts;S.streak++;
    if(S.streak>S.bestStreak)S.bestStreak=S.streak;
    S.totalCorrect++;S.lvlProg++;
    fb.className='feedback c-fb';
    fb.innerHTML=`✓ +${pts}${streakB>0?' <span style="color:var(--gold)">🔥×'+S.streak+'</span>':''}`;
    checkLevelUp();
  } else {
    AudioEngine.wrong();
    path.classList.add('map-wrong');
    // Highlight correct
    allPaths.forEach(p=>{
      if(p.dataset.name===q.answer) p.classList.add('map-highlight');
      else if(p!==path) p.classList.add('map-dim');
    });
    S.streak=0;S.lives--;
    fb.className='feedback w-fb';
    fb.textContent=`✗ ${q.answerObj?.name||q.answer}`;
  }
  S.totalAnswered++;
  updateHUD();
  if(S.lives<=0) setTimeout(endGame,1200);
  else setTimeout(nextQ,1200);
}

function handleTimeout(){
  if(S.answered)return;
  S.answered=true;
  AudioEngine.timeout();
  const q=S.currentQ;
  const fb=document.getElementById('feedback');

  if(q.type==='mc'){
    const allBtns=document.querySelectorAll('.opt-btn');
    allBtns.forEach(b=>{
      if(b.dataset.val===q.answer)b.classList.add('correct');
      else b.classList.add('disabled');
    });
  } else {
    const allPaths=document.querySelectorAll('#map-container path');
    allPaths.forEach(p=>{
      if(p.dataset.name===q.answer)p.classList.add('map-highlight');
      else p.classList.add('map-dim');
    });
  }

  recordStats(q.answerObj?.name||q.answer, false);
  S.streak=0;S.lives--;S.totalAnswered++;
  fb.className='feedback t-fb';
  fb.textContent=`⏱ ${q.answerObj?.name||q.answer}`;
  updateHUD();
  if(S.lives<=0) setTimeout(endGame,1200);
  else setTimeout(nextQ,1200);
}

function recordStats(name,correct){
  if(!name)return;
  const st=profile.countryStats[name]||{cor:0,wrn:0};
  if(correct)st.cor++;else st.wrn++;
  st.last=Date.now();
  profile.countryStats[name]=st;
}

function checkLevelUp(){
  if(S.lvlProg>=S.lvlTarget){
    S.level++;S.lvlProg=0;S.lvlTarget=Math.min(10,5+S.level);
    AudioEngine.levelUp();
    renderStagePills();
    const newStages=STAGES.filter(s=>s.unlock===S.level);
    if(newStages.length){
      const fb=document.getElementById('feedback');
      fb.innerHTML+=` <span style="color:var(--accent)">🎉 ${newStages[0].label} unlocked!</span>`;
    }
  }
}

// ═══════════════════════════════════════
// TIMER
// ═══════════════════════════════════════
function startTimer(){
  S.timerMax=getTimer();S.timerLeft=S.timerMax;
  const ring=document.getElementById('timer-ring');
  const fill=document.getElementById('timer-fl');
  const text=document.getElementById('timer-txt');
  const circ=2*Math.PI*22;
  ring.classList.remove('timer-danger');
  text.textContent=S.timerLeft;fill.style.strokeDashoffset='0';
  fill.style.stroke='';
  cancelAnimationFrame(S.timerRAF);
  const t0=performance.now();
  let lastSec=-1;
  function tick(now){
    const el=(now-t0)/1000;
    const rem=Math.max(0,S.timerMax-el);
    const sec=Math.ceil(rem);
    if(sec!==lastSec){
      lastSec=sec;S.timerLeft=sec;text.textContent=sec;
      if(rem<=4&&!ring.classList.contains('timer-danger')){
        ring.classList.add('timer-danger');
        fill.style.stroke='var(--wrong)';
      }
    }
    fill.style.strokeDashoffset=((1-rem/S.timerMax)*circ).toFixed(1);
    if(rem<=0){handleTimeout();return;}
    S.timerRAF=requestAnimationFrame(tick);
  }
  S.timerRAF=requestAnimationFrame(tick);
}
function stopTimer(){cancelAnimationFrame(S.timerRAF);}

// ═══════════════════════════════════════
// GAME FLOW
// ═══════════════════════════════════════
function nextQ(){
  S.answered=false;
  const stage=pickStage();
  let q;
  switch(stage.id){
    case 'flag': q=genFlagQ(); break;
    case 'capital': q=genCapitalQ(); break;
    case 'continent': q=genContinentQ(); break;
    case 'africa': q=genAfricaQ(); break;
    case 'lesser': q=genLesserKnownQ(); break;
    case 'map': q=genMapQ(); break;
    case 'usmap': q=genUSMapQ(); break;
    default: q=genFlagQ();
  }
  S.currentQ=q;
  if(q.type==='map') renderMap(q);
  else renderMC(q);
  updateHUD();
  startTimer();
}

function startGame(overrideLevel){
  document.getElementById('splash').classList.add('hidden');
  document.getElementById('gameover').classList.add('hidden');
  document.getElementById('learn-screen').classList.add('hidden');
  S.score=0;S.streak=0;S.bestStreak=0;
  S.level=overrideLevel||1;S.lvlProg=0;S.lvlTarget=Math.min(10,5+S.level);S.lives=3;
  S.totalCorrect=0;S.totalAnswered=0;S.recentAnswers=[];
  S.activeStages=['flag'];
  updateHUD();nextQ();
}

function endGame(){
  stopTimer();AudioEngine.gameOver();
  const isNew=S.score>profile.bestScore;
  if(isNew)profile.bestScore=S.score;
  profile.gamesPlayed++;
  const acc=S.totalAnswered>0?S.totalCorrect/S.totalAnswered:0;
  profile.sessionAcc.push(acc);
  if(profile.sessionAcc.length>20)profile.sessionAcc.shift();
  saveProfile();
  document.getElementById('go-score').textContent=S.score;
  document.getElementById('go-correct').textContent=S.totalCorrect;
  document.getElementById('go-streak').textContent=S.bestStreak;
  document.getElementById('go-level').textContent=S.level;
  document.getElementById('go-new').classList.toggle('hidden',!isNew);
  const sub=document.getElementById('go-sub');
  if(acc>=.9)sub.textContent='Incredible! 🌟';
  else if(acc>=.7)sub.textContent='Solid run!';
  else if(acc>=.5)sub.textContent='Keep practicing!';
  else sub.textContent='Every game makes you better.';
  document.getElementById('gameover').classList.remove('hidden');
}

function renderLearnPage(){
  const body = document.getElementById('learn-body');
  const continents = ['Europe','Asia','Africa','North America','South America','Oceania'];
  let html = '';

  continents.forEach(cont => {
    const countries = COUNTRIES.filter(c => c.continent === cont).sort((a,b) => a.name.localeCompare(b.name));
    if(!countries.length) return;
    html += `<div class="learn-continent">`;
    html += `<div class="learn-cont-title">${cont}</div>`;
    countries.forEach(c => {
      html += `<div class="learn-row">
        <div class="learn-flag">${flagHTML(c.cc, 32)}</div>
        <div class="learn-info">
          <div class="learn-name">${c.name}</div>
          <div class="learn-cap">Capital: ${c.capital}</div>
        </div>
      </div>`;
    });
    html += `</div>`;
  });

  // Admin section at bottom
  html += `<div class="learn-admin-link">
    <button id="admin-toggle-btn">🔧 Debug Tools</button>
  </div>
  <div class="admin-panel" id="admin-panel">
    <div class="admin-title">⚠ Level Debug</div>
    <div style="font-size:11px;color:var(--text-dim);margin-bottom:10px;">Enter passcode to unlock level jump:</div>
    <div class="admin-code-row">
      <input type="tel" class="admin-code-input" id="admin-code" placeholder="0000" maxlength="4" autocomplete="off">
      <button class="admin-code-btn" id="admin-unlock-btn">Unlock</button>
    </div>
    <div class="admin-msg" id="admin-msg"></div>
    <div class="admin-levels" id="admin-levels"></div>
  </div>`;

  body.innerHTML = html;

  // Wire admin toggle
  document.getElementById('admin-toggle-btn').addEventListener('click', () => {
    const panel = document.getElementById('admin-panel');
    panel.classList.toggle('show');
    AudioEngine.tap();
  });

  // Wire admin unlock
  document.getElementById('admin-unlock-btn').addEventListener('click', () => {
    adminUnlock();
  });
  document.getElementById('admin-code').addEventListener('keydown', (e) => {
    if(e.key === 'Enter') adminUnlock();
  });
}

// Admin passcodes — each level has a simple numeric code
const ADMIN_CODES = {
  '1337': 'all',   // Master code unlocks all levels
  '0005': 5,
  '0010': 10,
  '0015': 15,
  '0020': 20,
  '0025': 25,
  '0030': 30,
};

let adminUnlocked = new Set();

function adminUnlock(){
  const input = document.getElementById('admin-code');
  const msg = document.getElementById('admin-msg');
  const code = input.value.trim();

  if(ADMIN_CODES[code] === 'all'){
    adminUnlocked = new Set([1,5,10,15,20,25,30]);
    msg.textContent = '🔓 All levels unlocked!';
    msg.style.color = 'var(--correct)';
    AudioEngine.correct();
    renderAdminLevels();
  } else if(ADMIN_CODES[code]){
    adminUnlocked.add(ADMIN_CODES[code]);
    msg.textContent = `🔓 Level ${ADMIN_CODES[code]} unlocked!`;
    msg.style.color = 'var(--correct)';
    AudioEngine.correct();
    renderAdminLevels();
  } else {
    msg.textContent = '❌ Invalid code';
    msg.style.color = 'var(--wrong)';
    AudioEngine.wrong();
  }
  input.value = '';
}

function renderAdminLevels(){
  const container = document.getElementById('admin-levels');
  if(!container) return;
  const levels = [1,5,10,15,20,25,30];
  const stageNames = {1:'Flags',5:'Capitals',10:'Continents',15:'Africa',20:'Lesser Known',25:'Maps',30:'US States'};
  container.innerHTML = levels.map(lv => {
    const unlocked = adminUnlocked.has(lv);
    return `<button class="admin-lvl-btn ${unlocked?'unlocked':''}" data-lv="${lv}" ${unlocked?'':'disabled'}>
      Lv${lv} ${stageNames[lv]||''}
    </button>`;
  }).join('');

  container.querySelectorAll('.admin-lvl-btn.unlocked').forEach(btn => {
    btn.addEventListener('click', () => {
      const lv = parseInt(btn.dataset.lv);
      AudioEngine.tap();
      startGame(lv);
    });
  });
}
